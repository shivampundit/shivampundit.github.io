<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <link rel="stylesheet" href="./assets/css/app.css" />
  <title>Math Trainer</title>
</head>

<body onload="randomCreator()">

  <div class="container">
    
      <div class="mathCard">
        <div class="mathQuestion">
          <h1 class="display-4 questionText text-center mb-0">Placeholder Text</h1>
        </div>
        <form id="mathForm">
          <div class="form-group">
            <input type="text" class="" id="answerInput" placeholder="Type your answer here">
          </div>
          <button type="submit" class="btn ">Submit</button>
        </form>
        <div class="d-flex">
          <button class="btn " onclick="randomCreator()"><img class="svg" src="./assets/img/refresh.svg" alt="New Question" /></button>
          <button class="btn " onclick="answerHelp()"><img class="svg" src="./assets/img/answer.svg" alt="Answer" /></button>
        </div>
      </div>
  </div>

  <!-- JavaScript -->
  <script src="./assets/js/app.js"></script>
</body>

</html>
